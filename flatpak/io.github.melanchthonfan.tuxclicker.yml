app-id: io.github.melanchthonfan.tuxclicker
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: TuxClicker

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri

modules:
  - name: tux-clicker
    buildsystem: simple
    build-commands:
      - mkdir -p /app/bin
      - install -Dm755 "Tux Clicker.x86_64" /app/bin/TuxClicker
      - install -Dm644 "Tux Clicker.pck" /app/bin/TuxClicker.pck
      - install -Dm644 flatpak/icon.png /app/share/icons/hicolor/256x256/apps/io.github.melanchthonfan.tuxclicker.png
      - install -Dm644 flatpak/io.github.melanchthonfan.tuxclicker.desktop /app/share/applications/io.github.melanchthonfan.tuxclicker.desktop
      - install -Dm644 flatpak/io.github.melanchthonfan.tuxclicker.metainfo.xml /app/share/metainfo/io.github.melanchthonfan.tuxclicker.metainfo.xml

    sources:
      - type: dir
        path: ..
